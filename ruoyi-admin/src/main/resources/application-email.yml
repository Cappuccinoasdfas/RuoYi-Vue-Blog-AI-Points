# =====================================================
# 邮件服务配置文件 - 模板文件
# =====================================================
# 使用方法：
# 1. 复制此文件并重命名为 application-email.yml
# 2. 填写下面标注 [必填] 的配置项
# 3. application-email.yml 已被 .gitignore 忽略，不会提交到仓库
# =====================================================

spring:
  mail:
    # ========== 基础配置 ==========
    # [必填] 邮件服务器地址
    # QQ邮箱：smtp.qq.com
    # 163邮箱：smtp.163.com
    # Gmail：smtp.gmail.com
    # 企业邮箱：联系管理员获取
    host: smtp.qq.com
    
    # [必填] SMTP端口
    # 587 - TLS加密（推荐）
    # 465 - SSL加密
    # 25  - 无加密（不推荐）
    port: 587
    
    # [必填] 发件人邮箱账号（完整的邮箱地址）
    # 例如：yourname@qq.com
    username: your-email@example.com
    
    # [必填] 邮箱授权码/密码
    # ⚠️ 注意：不是登录密码！
    # QQ邮箱：设置 -> 账户 -> 生成授权码
    # 163邮箱：设置 -> POP3/SMTP -> 新增授权码
    # Gmail：应用专用密码
    password: your-auth-code
    
    # [可选] 编码格式（一般不需要改）
    default-encoding: UTF-8
    
    # ========== 高级配置（一般不需要修改） ==========
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# ========== 邮件模板配置 ==========
mail:
  template:
    # [可选] 应用名称（会显示在邮件中）
    app-name: "我的应用"
    
    # [可选] 验证码有效期（分钟）
    code-expire-minutes: 10

# ========== 环境变量方式（推荐生产环境使用） ==========
# 如果不想在文件中明文写密码，可以使用环境变量：
# 
# spring:
#   mail:
#     username: ${SMTP_USERNAME}
#     password: ${SMTP_PASSWORD}
#
# 然后在系统环境变量中设置：
# - SMTP_USERNAME=your-email@qq.com
# - SMTP_PASSWORD=your-auth-code